<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小院鸡生</title>
  </head>
  <body>
    <div id="app">
      <section id="namingPanel" class="naming-panel" aria-labelledby="namingTitle" hidden>
        <form id="namingForm" class="naming-card">
          <span>第一天</span>
          <h1 id="namingTitle">给这只鸡起个名字</h1>
          <p>以后你会用这个名字呼唤它回家。</p>
          <input
            id="chickenNameInput"
            name="chickenName"
            type="text"
            maxlength="12"
            autocomplete="off"
            placeholder="小鸡"
          />
          <button type="submit">就叫这个名字</button>
        </form>
      </section>

      <section
        id="closeInteractionPanel"
        class="close-interaction"
        role="dialog"
        aria-modal="true"
        aria-labelledby="closeInteractionTitle"
        hidden
      >
        <div class="close-interaction__scene" aria-hidden="true">
          <div class="close-interaction__morning-light"></div>
          <div id="closeChicken" class="close-chicken"></div>
          <div class="close-hand"></div>
        </div>
        <div class="close-interaction__controls">
          <span class="close-interaction__eyebrow">清晨近景</span>
          <h2 id="closeInteractionTitle">把手放低一点</h2>
          <p id="closeInteractionPrompt">等它看清你手里的食物，再慢慢靠近。</p>
          <div class="close-interaction__group">
            <span>手心里放什么</span>
            <div id="closeFoodChoices" class="close-choice-row"></div>
          </div>
          <div class="close-interaction__group">
            <span>吃完以后</span>
            <div id="closeTouchChoices" class="close-choice-row"></div>
          </div>
          <button id="closeInteractionDone" type="button" disabled>把手慢慢递过去</button>
        </div>
      </section>

      <div id="saveWarning" class="save-warning" role="status" hidden>
        浏览器未允许保存；关闭页面后本次进度会消失。
      </div>

      <div id="game"></div>

      <div id="hud" aria-live="polite">
        <section class="time-capsule">
          <div class="day-chip">
            <span id="dayLabel">第 1 天</span>
            <strong id="phaseLabel">清晨找蛋</strong>
          </div>
          <div class="clock">
            <span id="timeLabel">清晨</span>
            <i id="clockNeedle"></i>
          </div>
        </section>

        <section class="minimal-hud">
          <div class="wood-chip">
            <span>修缮木料</span>
            <b id="woodLabel">0</b>
          </div>
          <div id="sprintWrap" class="sprint-wrap" hidden>
            <span>冲刺劲</span>
            <div class="meter-track"><i id="staminaMeter"></i></div>
          </div>
        </section>

        <div id="contextPrompt" class="goal-tip">先在院子里找到今天的蛋。</div>
        <div id="toast" class="toast">小院醒了。</div>

        <div id="rewardPanel" class="reward-panel" hidden>
          <span id="rewardTitle">本能觉醒</span>
          <strong id="rewardName">会刨土了</strong>
          <p id="rewardEffect">新的本领已经记住。</p>
        </div>

        <section id="debugPanel" class="debug-panel" hidden>
          <div class="panel-head">
            <span>调试</span>
            <button id="debugClose" type="button">×</button>
          </div>
          <div class="debug-actions">
            <button type="button" data-debug="addAffection">+亲密</button>
            <button type="button" data-debug="addMaterials">+木料</button>
            <button type="button" data-debug="jumpDusk">跳黄昏</button>
            <button type="button" data-debug="setLowAffection">低亲密归巢</button>
            <button type="button" data-debug="setHighAffection">高亲密归巢</button>
            <button type="button" data-debug="spawnWeasel">黄鼠狼</button>
            <button type="button" data-debug="clearSave">清空存档</button>
          </div>
          <label class="debug-egg">
            <span>指定产蛋</span>
            <select id="debugEggType">
              <option value="greenLeaf">青叶蛋</option>
              <option value="swift">疾走蛋</option>
              <option value="lantern">守夜蛋</option>
              <option value="brave">铁胆蛋</option>
              <option value="sunny">暖瓜子蛋</option>
              <option value="fullBelly">饱饱蛋</option>
              <option value="balanced">均衡蛋</option>
              <option value="cracked">裂纹蛋</option>
            </select>
            <button type="button" id="forceEggButton">指定</button>
          </label>
          <label class="debug-volume">
            <span>总音量</span>
            <input id="masterVolume" type="range" min="0" max="100" step="1" value="70" />
            <b id="masterVolumeLabel">70%</b>
          </label>
          <p>F1 开关调试，F2 +亲密，F3 +木料，F4 跳黄昏，F5 生成黄鼠狼。</p>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
